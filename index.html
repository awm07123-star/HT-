<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000; /* Dark Background */
            font-family: 'Arial Black', Gadget, sans-serif;
        }

        .warning-container {
            border: 5px solid #FF0000;
            padding: 50px;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.7);
            max-width: 90%;
        }

        .main-text {
            color: #FF0000;
            font-size: 60px; /* Bada Size */
            margin: 0;
            line-height: 1.2;
            text-transform: uppercase;
        }

        .sub-text {
            color: #FFFFFF;
            font-size: 35px; /* Bada Size */
            margin-top: 30px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="warning-container">
        <h1 class="main-text">
            ⚠️ PEHLE PAYMENT DO <br> FIR USE KARO ⚠️
        </h1>
        <p class="sub-text">
            FIRST PAYMENT OTHERWISE MOBILE WILL BE <br> BLOCK ACCESS TO WEBSITE
        </p>
    </div>

</body>
</html>
